name: Schattenwerfer
options:
  bundleIdPrefix: it.ravensburg
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  Schattenwerfer:
    type: application
    platform: iOS
    # SunMath-Quelle wird direkt mitkompiliert (geteilte Datei); das SwiftPM-Paket
    # SunMathKit dient nur den Host-Tests (swift test). So braucht der App-Build
    # keine SPM-Auflösung und funktioniert mit `xcodebuild -target -sdk`.
    sources:
      - Sources
      - SunMathKit/Sources/SunMathKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: it.ravensburg.schattenwerfer
        INFOPLIST_FILE: Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Schattenwerfer:
    build:
      targets:
        Schattenwerfer: all
